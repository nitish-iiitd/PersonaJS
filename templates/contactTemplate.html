<div class="persona-aside" data-section="contact">
    <h2 class="persona-aside-heading">Contact</h2>
    <ul class="persona-contact-list">
        <li>
            <span class="bi bi-telephone-fill" aria-hidden="true"></span>
            <a href="tel:{{phone}}">{{phone}}</a>
        </li>
        <li>
            <span class="bi bi-envelope-fill" aria-hidden="true"></span>
            <a href="mailto:{{email}}">{{email}}</a>
        </li>
    </ul>
</div>
