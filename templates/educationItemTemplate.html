<div class="persona-card">
    <div class="persona-edu">
        <img src="{{ education.institute_logo }}" class="persona-edu__logo" alt="{{ education.institute }}">
        <div style="flex: 1; min-width: 0;">
            <h4 class="persona-edu__degree">{{ education.degree }}</h4>
            <p class="persona-edu__inst">{{ education.institute }}</p>
            <div class="persona-edu__foot">
                <span class="persona-edu__score">{{ education.score_value }} &middot; {{ education.score_type }}</span>
                <span class="persona-edu__date">{{ education.duration }}</span>
            </div>
        </div>
    </div>
</div>
